name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      - name: "Build with Next.js"
        run: npm run build

      - name: "Check build output"
        run: |
          echo "Current directory: $(pwd)"
          ls -la
          if [ -d "out" ]; then
            echo "'out' directory exists."
            ls -R out
          elif [ -d ".next" ]; then
            echo "'.next' directory exists but 'out' does not. Static export might have failed."
            ls -la .next
          else
            echo "Neither 'out' nor '.next' directories exist."
          fi

      - name: "Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./out"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
